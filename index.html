<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Sector Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #05080f;
  --bg2:      #090d18;
  --bg3:      #0e1422;
  --bg4:      #141b2d;
  --border:   rgba(255,255,255,0.06);
  --border2:  rgba(255,255,255,0.12);
  --accent:   #00ffe0;
  --accent2:  #0077ff;
  --warn:     #ffb800;
  --danger:   #ff3d5a;
  --text:     #dde6f0;
  --text2:    #6b7f99;
  --text3:    #2e3f55;
  --up:       #00ffe0;
  --down:     #ff3d5a;
  --pre:      #00ffe0;
  --moving:   #ffb800;
  --late:     #ff3d5a;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Mulish', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise texture overlay */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:999;
  opacity:0.4;
}

/* Scan line effect */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events:none;
  z-index:998;
}

.app { display:flex; height:100vh; overflow:hidden; position:relative; z-index:1; }

/* ─── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  width:220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  overflow:hidden;
}

.logo-block {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 4px;
  color: var(--accent);
  line-height: 1;
  text-shadow: 0 0 20px rgba(0,255,224,0.4);
}

.logo-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
  margin-top: 3px;
  text-transform: uppercase;
}

.sidebar-section {
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}

.sidebar-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 2px;
  padding: 0 20px 10px;
  text-transform: uppercase;
}

.sector-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  transition: all 0.15s;
  border-left: 2px solid transparent;
  position: relative;
}

.sector-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }

.sector-btn.active {
  color: var(--text);
  background: rgba(0,255,224,0.04);
  border-left-color: var(--accent);
}

.sector-icon { font-size:15px; width:18px; text-align:center; }

.sector-count {
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text3);
}

.sector-btn.active .sector-count { color: var(--accent); }

/* Alert dot */
.alert-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--warn);
  box-shadow: 0 0 8px var(--warn);
  margin-left: auto;
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
@keyframes scanPulse { 0%{opacity:0.6} 50%{opacity:1} 100%{opacity:0.6} }
@keyframes scoreGrow { from{width:0} to{width:var(--target-w)} }
@keyframes spin { to{transform:rotate(360deg)} }

.sidebar-bottom {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.market-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text2);
}

.status-dot {
  width:7px; height:7px; border-radius:50%;
  background: var(--up);
  box-shadow: 0 0 8px var(--up);
  animation: pulse 2s infinite;
}

/* ─── MAIN ────────────────────────────────────────── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* Ticker tape */
.tape {
  height:30px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  overflow:hidden;
  flex-shrink:0;
}

.tape-inner {
  display:flex;
  white-space:nowrap;
  animation: tape-scroll 50s linear infinite;
}

@keyframes tape-scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }

.tape-item {
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:0 18px;
  border-right:1px solid var(--border);
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
}

.tape-item .ts { color:var(--text2); }
.tape-item .tp { color:var(--text); font-weight:700; }
.tape-item.up .tc { color:var(--up); }
.tape-item.down .tc { color:var(--down); }

/* Top bar */
.topbar {
  height:52px;
  display:flex;
  align-items:center;
  padding:0 20px;
  gap:12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--bg2);
}

.topbar-sector {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:3px;
  color:var(--text);
}

.topbar-sector span { color:var(--accent); }

.scan-badge {
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 12px;
  border-radius:4px;
  background:rgba(0,255,224,0.06);
  border:1px solid rgba(0,255,224,0.15);
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--accent);
  animation: scanPulse 2s infinite;
}

.topbar-right {
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:16px;
}

.sort-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1px;
}

.sort-btn {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  padding:4px 10px;
  border-radius:4px;
  border:1px solid var(--border);
  color:var(--text2);
  cursor:pointer;
  background:transparent;
  transition:all 0.15s;
}

.sort-btn:hover, .sort-btn.active {
  border-color:rgba(0,255,224,0.3);
  color:var(--accent);
  background:rgba(0,255,224,0.05);
}

/* ─── CONTENT ─────────────────────────────────────── */
.content {
  flex:1;
  display:grid;
  grid-template-columns:1fr 340px;
  gap:0;
  overflow:hidden;
}

/* Scanner panel */
.scanner-panel {
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-right:1px solid var(--border);
}

/* Summary bar */
.summary-bar {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:4px;
}

.sum-card {
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 14px;
}

.sum-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:4px;
}

.sum-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:1px;
}

/* Stock cards */
.stock-card {
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  cursor:pointer;
  transition:all 0.2s;
  animation: fadeUp 0.3s ease both;
  position:relative;
  overflow:hidden;
}

.stock-card::before {
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:3px;
  border-radius:10px 0 0 10px;
}

.stock-card.pre-move::before { background:var(--pre); box-shadow:2px 0 12px rgba(0,255,224,0.3); }
.stock-card.moving::before   { background:var(--moving); box-shadow:2px 0 12px rgba(255,184,0,0.3); }
.stock-card.late::before     { background:var(--late); box-shadow:2px 0 12px rgba(255,61,90,0.3); }

.stock-card:hover {
  border-color:var(--border2);
  transform:translateX(3px);
  background:var(--bg4);
}

.stock-card.selected {
  border-color:rgba(0,255,224,0.25);
  background:rgba(0,255,224,0.03);
}

.card-top {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:10px;
}

.card-left { display:flex; align-items:center; gap:12px; }

.ticker-block {}
.ticker { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; line-height:1; }
.company-name { font-size:11px; color:var(--text2); margin-top:2px; }

.window-badge {
  padding:3px 9px;
  border-radius:4px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
}

.window-badge.pre-move { background:rgba(0,255,224,0.1); color:var(--pre); border:1px solid rgba(0,255,224,0.2); }
.window-badge.moving   { background:rgba(255,184,0,0.1); color:var(--moving); border:1px solid rgba(255,184,0,0.2); }
.window-badge.late     { background:rgba(255,61,90,0.1); color:var(--late); border:1px solid rgba(255,61,90,0.2); }

.card-right { text-align:right; }
.card-price { font-family:'IBM Plex Mono',monospace; font-size:16px; font-weight:700; }
.card-change {
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  font-weight:700;
  display:inline-block;
  padding:2px 7px;
  border-radius:4px;
  margin-top:3px;
}
.card-change.up { background:rgba(0,255,224,0.1); color:var(--up); }
.card-change.dn { background:rgba(255,61,90,0.1); color:var(--down); }

/* Score bar */
.score-section {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.score-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text3);
  text-transform:uppercase;
  width:50px;
  flex-shrink:0;
}

.score-track {
  flex:1;
  height:6px;
  background:rgba(255,255,255,0.05);
  border-radius:3px;
  overflow:hidden;
}

.score-fill {
  height:100%;
  border-radius:3px;
  transition:width 0.8s cubic-bezier(0.4,0,0.2,1);
}

.score-num {
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  font-weight:700;
  width:34px;
  text-align:right;
  flex-shrink:0;
}

/* Tags row */
.tags-row {
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.tag {
  padding:2px 8px;
  border-radius:3px;
  font-size:9px;
  font-weight:700;
  letter-spacing:0.5px;
  text-transform:uppercase;
  border:1px solid;
}

.tag.catalyst { background:rgba(255,184,0,0.08); color:var(--warn); border-color:rgba(255,184,0,0.2); }
.tag.volume   { background:rgba(0,119,255,0.08); color:#4da6ff; border-color:rgba(0,119,255,0.2); }
.tag.news     { background:rgba(148,0,255,0.08); color:#c084fc; border-color:rgba(148,0,255,0.2); }
.tag.social   { background:rgba(255,105,180,0.08); color:#f472b6; border-color:rgba(255,105,180,0.2); }
.tag.analyst  { background:rgba(0,255,224,0.08); color:var(--accent); border-color:rgba(0,255,224,0.2); }
.tag.earnings { background:rgba(255,184,0,0.08); color:var(--warn); border-color:rgba(255,184,0,0.2); }
.tag.fda      { background:rgba(255,61,90,0.08); color:var(--down); border-color:rgba(255,61,90,0.2); }

.catalyst-line {
  margin-top:8px;
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:var(--warn);
}

.cat-icon { font-size:12px; }

/* ─── DETAIL PANEL ────────────────────────────────── */
.detail-panel {
  overflow-y:auto;
  background:var(--bg2);
  display:flex;
  flex-direction:column;
}

.detail-header {
  padding:18px 18px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.detail-ticker {
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;
  letter-spacing:3px;
  line-height:1;
}

.detail-name { font-size:12px; color:var(--text2); margin-top:4px; }
.detail-price { font-family:'IBM Plex Mono',monospace; font-size:28px; font-weight:700; margin-top:10px; }
.detail-change { font-family:'IBM Plex Mono',monospace; font-size:13px; margin-top:3px; }

/* Score breakdown */
.score-breakdown {
  padding:16px 18px;
  border-bottom:1px solid var(--border);
}

.section-title {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  color:var(--text3);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:12px;
}

.breakdown-row {
  display:flex;
  align-items:center;
  gap:8px;
  padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,0.03);
}

.breakdown-row:last-child { border-bottom:none; }

.br-source {
  font-size:11px;
  color:var(--text2);
  width:130px;
  flex-shrink:0;
}

.br-track {
  flex:1;
  height:4px;
  background:rgba(255,255,255,0.05);
  border-radius:2px;
  overflow:hidden;
}

.br-fill { height:100%; border-radius:2px; transition:width 0.8s cubic-bezier(0.4,0,0.2,1); }

.br-pts {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  font-weight:700;
  width:36px;
  text-align:right;
  flex-shrink:0;
}

/* Total score */
.total-score-block {
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.total-label {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1px;
}

.total-score-val {
  font-family:'Bebas Neue',sans-serif;
  font-size:40px;
  letter-spacing:2px;
  line-height:1;
}

.total-signal {
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;
  font-weight:700;
  padding:6px 14px;
  border-radius:6px;
}

.total-signal.buy { background:rgba(0,255,224,0.1); color:var(--up); border:1px solid rgba(0,255,224,0.25); }
.total-signal.hold { background:rgba(255,184,0,0.1); color:var(--warn); border:1px solid rgba(255,184,0,0.25); }
.total-signal.sell { background:rgba(255,61,90,0.1); color:var(--down); border:1px solid rgba(255,61,90,0.25); }

/* Window explanation */
.window-explain {
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.2);
}

.window-title {
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  font-weight:700;
  margin-bottom:5px;
}

.window-desc { font-size:12px; color:var(--text2); line-height:1.6; }

/* News in detail */
.detail-news { padding:14px 18px; }

.detail-news-item {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;
}

.detail-news-item:hover { padding-left:4px; transition:padding 0.15s; }
.detail-news-item:last-child { border-bottom:none; }

.dni-meta {
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:4px;
}

.dni-time { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--text3); }
.dni-sent { font-size:9px; font-weight:700; padding:1px 6px; border-radius:3px; }
.dni-sent.pos { background:rgba(0,255,224,0.1); color:var(--up); }
.dni-sent.neg { background:rgba(255,61,90,0.1); color:var(--down); }
.dni-sent.neu { background:rgba(107,127,153,0.1); color:var(--text2); }

.dni-headline { font-size:11px; line-height:1.5; color:var(--text); }

/* Loading state */
.scanning-overlay {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:300px;
  gap:16px;
}

.scan-spinner {
  width:40px; height:40px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

.scan-text {
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--accent);
  letter-spacing:2px;
  animation:scanPulse 1.5s infinite;
}

/* scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo-block">
      <div class="logo">APEX</div>
      <div class="logo-sub">Sector Scanner v1.0</div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Sectors</div>
      <div class="sector-btn active" onclick="selectSector('biotech',this)">
        <span class="sector-icon">🧬</span> Biotech
        <span class="sector-count" id="cnt-biotech">12</span>
      </div>
      <div class="sector-btn" onclick="selectSector('ai',this)">
        <span class="sector-icon">🤖</span> Artificial Intelligence
        <span class="sector-count" id="cnt-ai">9</span>
      </div>
      <div class="sector-btn" onclick="selectSector('tech',this)">
        <span class="sector-icon">💻</span> Technology
        <span class="sector-count" id="cnt-tech">15</span>
      </div>
      <div class="sector-btn" onclick="selectSector('finance',this)">
        <span class="sector-icon">🏦</span> Finance
        <span class="sector-count" id="cnt-finance">11</span>
      </div>
      <div class="sector-btn" onclick="selectSector('energy',this)">
        <span class="sector-icon">⚡</span> Energy
        <span class="sector-count" id="cnt-energy">8</span>
      </div>
      <div class="sector-btn" onclick="selectSector('defence',this)">
        <span class="sector-icon">🛡️</span> Defence
        <span class="sector-count" id="cnt-defence">6</span>
      </div>
      <div class="sector-btn" onclick="selectSector('consumer',this)">
        <span class="sector-icon">🛍️</span> Consumer
        <span class="sector-count" id="cnt-consumer">10</span>
      </div>
      <div class="sector-btn" onclick="selectSector('commodities',this)">
        <span class="sector-icon">🪙</span> Commodities
        <span class="sector-count" id="cnt-commodities">7</span>
      </div>
    </div>

    <div class="sidebar-bottom">
      <div class="market-status">
        <div class="status-dot"></div>
        <span>Markets Open</span>
      </div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-top:6px;" id="clock">--:--:-- UTC</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TAPE -->
    <div class="tape">
      <div class="tape-inner" id="tapeInner"></div>
    </div>

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-sector" id="topbarSector">SCANNING: <span>BIOTECH</span></div>
      <div class="scan-badge">⬡ LIVE SCAN</div>
      <div class="topbar-right">
        <span class="sort-label">Sort:</span>
        <div class="sort-btn active" onclick="sortCards('score',this)">Score</div>
        <div class="sort-btn" onclick="sortCards('change',this)">% Move</div>
        <div class="sort-btn" onclick="sortCards('catalyst',this)">Catalyst</div>
        <div class="sort-btn" onclick="sortCards('window',this)">Window</div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- SCANNER -->

// ── SCORING ────────────────────────────────────────────────────────────────────
function totalScore(s) {
  return s.scores.catalyst + s.scores.analyst + s.scores.news + s.scores.volume + s.scores.social;
}

function windowOrder(w) { return w==='pre-move'?0:w==='moving'?1:2; }

function sortStocks(stocks) {
  return [...stocks].sort((a,b) => {
    if(currentSort==='score')    return totalScore(b)-totalScore(a);
    if(currentSort==='change')   return Math.abs(b.change)-Math.abs(a.change);
    if(currentSort==='catalyst') return a.catalystDays-b.catalystDays;
    if(currentSort==='window')   return windowOrder(a.window)-windowOrder(b.window);
    return 0;
  });
}

}

  document.getElementById('summaryBar').innerHTML = `

    </div>

    ${s.catalystDays <= 14 ? `
    <div style="padding:12px 18px;border-bottom:1px solid var(--border);background:rgba(255,184,0,0.04)">
      <div class="section-title">Upcoming Catalyst</div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
        <div style="font-size:22px">${s.catalystType==='FDA'?'💊':s.catalystType==='EARNINGS'?'📊':'📅'}</div>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--warn)">${s.catalystText}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">${s.catalystDays===1?'Tomorrow — very high urgency':s.catalystDays<=5?s.catalystDays+' days — high urgency':s.catalystDays+' days — moderate urgency'}</div>
        </div>
      </div>
    </div>` : ''}

    <div class="detail-news">
      <div class="section-title">Latest News</div>
      ${s.news.map(n => `
      <div class="detail-news-item">
        <div class="dni-meta">
          <span class="dni-time">${n.t}</span>
          <span class="dni-sent ${n.s}">${n.s==='pos'?'Positive':n.s==='neg'?'Negative':'Neutral'}</span>
        </div>
        <div class="dni-headline">${n.h}</div>
      </div>`).join('')}
    </div>`;
}

// ── SECTOR SELECT ─────────────────────────────────────────────────────────────
function selectSector(sector, el) {
  currentSector = sector;
  document.querySelectorAll('.sector-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

  const names = {biotech:'BIOTECH',ai:'ARTIFICIAL INTELLIGENCE',tech:'TECHNOLOGY',finance:'FINANCE',energy:'ENERGY',defence:'DEFENCE',consumer:'CONSUMER',commodities:'COMMODITIES'};
  document.getElementById('topbarSector').innerHTML = `SCANNING: <span>${names[sector]||sector.toUpperCase()}</span>`;

  // Clear detail
  document.getElementById('detailPanel').innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;opacity:0.3;"><div style="font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;color:var(--accent);">APEX</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:2px;">SELECT A STOCK TO ANALYSE</div></div>`;

  const stocks = stockDB[sector] || [];
  renderSummary(stocks);
  renderCards(stocks);
}

function sortCards(sort, el) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const stocks = stockDB[currentSector] || [];
  renderSummary(stocks);
  renderCards(stocks);
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toUTCString().slice(17,25) + ' UTC';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderTape();
const initStocks = stockDB.biotech;
renderSummary(initStocks);
renderCards(initStocks);
updateClock();
setInterval(updateClock, 1000);
</script>
